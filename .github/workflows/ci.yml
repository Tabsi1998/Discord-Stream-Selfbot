name: Build, Test and Docker

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: "**/package-lock.json"

      - name: Install root dependencies
        run: npm ci

      - name: Run control panel CI pipeline
        run: npm run ci:control-panel

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify control panel Docker build
        run: docker build --pull -f docker/control-panel.Dockerfile .
