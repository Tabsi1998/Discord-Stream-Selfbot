services:
  control-panel:
    container_name: discord-stream-selfbot
    build:
      context: ..
      dockerfile: docker/control-panel.Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATA_FILE: ${DATA_FILE:-/app/examples/control-panel/data/control-panel-state.json}
      NODE_ENV: production
      PORT: ${PORT:-3099}
      TZ: ${TZ:-Europe/Vienna}
    ports:
      - "${HOST_PORT:-3099}:${PORT:-3099}"
    volumes:
      - ./data:/app/examples/control-panel/data
      - ./cookies:/app/examples/control-panel/cookies:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3099) + '/api/state').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
